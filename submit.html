<!doctype html>
<html lang="en">
<head>
  <!-- Author: Vladden Schwartzman -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SC Climbing — Submit a Route</title>

  <link rel="stylesheet" href="combined-styles.css">
</head>
<body>

  <header class="site-header dark">
    <div class="header-inner container">
      <div class="logo">SC Climbing</div>
      <nav class="main-nav" aria-label="Main Navigation">
        <a href="index.html">Home</a>
        <a href="mountains.html">Mountains</a>
        <a href="safety.html">Safety</a>
        <a href="indoorclimbing.html">Indoor Climbing</a>
        <a href="submit.html" class="active">Submit a Route</a>
      </nav>
    </div>
  </header>

  <section class="mountains-hero" aria-labelledby="submit-title">
    <div class="container">
      <h1 id="submit-title">Submit a Route</h1>
      <p>
        Help us give you better information by submitting your favorite routes here.
      </p>
    </div>
  </section>

  <main class="main">
    <div class="form-card" role="form" aria-labelledby="form-title">
      
      <form id="routeForm" action="#">
        <h3 id="form-title" style="margin-top:0; margin-bottom:8px; color:#fff;">
          Share a Route
        </h3>

        <label for="first">First Name</label>
        <input id="first" name="first" type="text" placeholder="Jane">

        <label for="last">Last Name</label>
        <input id="last" name="last" type="text" placeholder="Smitherton">

        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com">

        <label for="info">Route Information</label>
        <textarea id="info" name="info" placeholder="Enter route name, difficulty, location..."></textarea>

        <button type="submit" class="btn btn-primary" style="margin-top:16px;">
          Submit
        </button>
      </form>
    </div>
  </main>

  <footer class="footer">
    SC Outdoor Climbing Guide<br>
    Your resource for outdoor climbing in South Carolina
  </footer>

  <script>
    document.getElementById("routeForm").addEventListener("submit", function(event) {
      
      var first = document.getElementById("first").value.trim();
      var last = document.getElementById("last").value.trim();
      var email = document.getElementById("email").value.trim();
      var info = document.getElementById("info").value.trim();

      var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

      if (first === "" || last === "" || email === "" || info === "") {
        alert("Please fill out all fields.");
        event.preventDefault();
        return;
      }

      if (!email.match(emailPattern)) {
        alert("Please enter a valid email address.");
        event.preventDefault();
        return;
      }

      alert("Form submitted successfully!");
    });
  </script>

</body>
</html>
